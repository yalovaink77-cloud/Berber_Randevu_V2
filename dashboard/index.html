<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berber Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --border: #2a2620;
    --gold: #c9a84c;
    --gold-dim: #7a6330;
    --text: #e8e0d0;
    --muted: #7a7268;
    --danger: #c0392b;
    --success: #27ae60;
    --pending: #c9a84c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ===== LOGIN ===== */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 0%, #2a1f0a 0%, #0f0e0c 70%);
  }

  .login-box {
    width: 380px;
    padding: 48px 40px;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .login-logo {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .login-sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 36px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--gold-dim);
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: #0f0e0c;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }

  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-msg {
    color: var(--danger);
    font-size: 13px;
    margin-top: 14px;
    display: none;
  }

  /* ===== DASHBOARD ===== */
  #dashboard-screen { display: none; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .topbar-logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .barber-name {
    font-size: 13px;
    color: var(--muted);
  }

  .status-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    outline: none;
  }

  .status-select:focus {
    border-color: var(--gold-dim);
  }

  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 16px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .btn-logout:hover { border-color: var(--gold-dim); color: var(--text); }

  .main {
    padding: 32px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Tarih başlığı */
  .date-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
  }

  .date-big {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    color: var(--text);
  }

  .date-sub {
    color: var(--muted);
    font-size: 14px;
  }

  /* Özet kartları */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 36px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px 20px;
  }

  .summary-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .summary-value {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--gold);
  }

  .summary-unit {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Randevu listesi */
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .appointment-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .appointment-row {
    display: grid;
    grid-template-columns: 80px 1fr 140px 100px 100px;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    transition: border-color 0.2s;
  }

  .appointment-row:hover { border-left-color: var(--gold-dim); }
  .appointment-row.status-confirmed { border-left-color: var(--success); }
  .appointment-row.status-pending { border-left-color: var(--pending); }
  .appointment-row.status-cancelled { opacity: 0.4; }
  .appointment-row.status-completed { border-left-color: var(--muted); }

  .appt-time {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--gold);
  }

  .appt-name {
    font-size: 15px;
    color: var(--text);
  }

  .appt-phone {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .appt-service {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .appt-price {
    font-size: 15px;
    color: var(--text);
    text-align: right;
  }

  .status-badge {
    display: inline-block;
    padding: 4px 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border: 1px solid;
    text-align: center;
  }

  .badge-pending { color: var(--pending); border-color: var(--pending); }
  .badge-confirmed { color: var(--success); border-color: var(--success); }
  .badge-completed { color: var(--muted); border-color: var(--muted); }
  .badge-cancelled { color: var(--danger); border-color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tarih seçici */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .btn-nav {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px;
    height: 36px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .btn-nav:hover { border-color: var(--gold-dim); color: var(--text); }

  input[type="date"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    cursor: pointer;
  }

  input[type="date"]:focus { border-color: var(--gold-dim); }

  .assistant-section {
    margin-top: 36px;
  }

  .missed-call-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .missed-call-row {
    display: grid;
    grid-template-columns: 180px 120px 1fr 120px;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .call-name {
    color: var(--text);
    font-size: 14px;
  }

  .call-phone,
  .call-time,
  .call-message {
    color: var(--muted);
    font-size: 12px;
  }

  .call-message {
    line-height: 1.4;
  }

  .category-badge {
    color: var(--gold);
    border: 1px solid var(--gold-dim);
    padding: 4px 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">✂ Berber</div>
    <div class="login-sub">Yönetim Paneli</div>
    <div class="field">
      <label>Telefon</label>
      <input type="text" inputmode="tel" id="login-phone" placeholder="+905551234567" />
    </div>
    <div class="field">
      <label>Şifre</label>
      <input type="password" id="login-password" placeholder="••••••" />
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Giriş Yap</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen">
  <div class="topbar">
    <div class="topbar-logo">✂ Berber Paneli</div>
    <div class="topbar-right">
      <select class="status-select" id="assistant-status" onchange="updateAssistantStatus()">
        <option value="available">Müsaitim</option>
        <option value="working">Çalışıyorum</option>
        <option value="break">Moladayım</option>
        <option value="closed">Kapalıyız</option>
      </select>
      <span class="barber-name" id="barber-name-display"></span>
      <button class="btn-logout" onclick="doLogout()">Çıkış</button>
    </div>
  </div>

  <div class="main">
    <div class="date-header">
      <div class="date-big" id="display-date"></div>
      <div class="date-sub" id="display-day"></div>
    </div>

    <!-- Özet -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">Toplam Randevu</div>
        <div class="summary-value" id="stat-total">—</div>
        <div class="summary-unit">bugün</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Onaylanan</div>
        <div class="summary-value" id="stat-confirmed">—</div>
        <div class="summary-unit">randevu</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Bekleyen</div>
        <div class="summary-value" id="stat-pending">—</div>
        <div class="summary-unit">randevu</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Tahmini Gelir</div>
        <div class="summary-value" id="stat-revenue">—</div>
        <div class="summary-unit">TL</div>
      </div>
    </div>

    <!-- Tarih seçici -->
    <div class="date-nav">
      <button class="btn-nav" onclick="changeDay(-1)">‹</button>
      <input type="date" id="date-picker" onchange="loadAppointments()" />
      <button class="btn-nav" onclick="changeDay(1)">›</button>
    </div>

    <!-- Randevular -->
    <div class="section-title">Günlük Program</div>
    <div id="appointments-container">
      <div class="loading"><span class="spinner"></span> Yükleniyor...</div>
    </div>

    <div class="assistant-section">
      <div class="section-title">Kaçan Aramalar</div>
      <div id="missed-calls-container">
        <div class="loading"><span class="spinner"></span> Yükleniyor...</div>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000';
  
  // Güvenli Depolama Yardımcısı (iFrame içinde çerez/depolama engelleme durumlarında çökmemesi için)
  const safeStorage = {
    getItem: function(key) {
      try { return localStorage.getItem(key); } catch(e) { return this._mem[key] || null; }
    },
    setItem: function(key, val) {
      try { localStorage.setItem(key, val); } catch(e) { this._mem[key] = String(val); }
    },
    removeItem: function(key) {
      try { localStorage.removeItem(key); } catch(e) { delete this._mem[key]; }
    },
    _mem: {}
  };

  let token = safeStorage.getItem('berber_token');
  let currentUser = null;
  try {
    currentUser = JSON.parse(safeStorage.getItem('berber_user') || 'null');
  } catch(e) {
    console.error("Kullanıcı verisi ayrıştırılamadı:", e);
  }

  const DAYS = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const MONTHS = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const SERVICES = {
    haircut: 'Saç Kesimi',
    shave: 'Tıraş',
    beard_trim: 'Sakal',
    full_service: 'Komple',
    hair_coloring: 'Boya',
    hair_wash: 'Yıkama',
    other: 'Diğer'
  };
  const STATUS_TR = { pending: 'Bekliyor', confirmed: 'Onaylı', completed: 'Tamamlandı', cancelled: 'İptal' };

  // Sayfa açılışında oturum kontrolü
  if (token && currentUser) showDashboard();

  async function doLogin() {
    const phone = document.getElementById('login-phone').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');

    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Giriş yapılıyor...';

    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, password })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Giriş başarısız');

      token = data.token;
      currentUser = data.user;
      safeStorage.setItem('berber_token', token);
      safeStorage.setItem('berber_user', JSON.stringify(currentUser));
      showDashboard();
    } catch (e) {
      err.textContent = e.message;
      err.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Giriş Yap';
    }
  }

  // Enter tuşu
  document.getElementById('login-password')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogout() {
    safeStorage.removeItem('berber_token');
    safeStorage.removeItem('berber_user');
    token = null; currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard-screen').style.display = 'none';
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-screen').style.display = 'block';
    document.getElementById('barber-name-display').textContent = currentUser?.name || '';
    document.getElementById('assistant-status').value = currentUser?.assistantStatus || 'working';

    const picker = document.getElementById('date-picker');
    picker.value = todayStr();
    updateDateHeader(new Date());
    loadAssistantProfile();
    loadAppointments();
    loadMissedCalls();
  }

  async function loadAssistantProfile() {
    try {
      const res = await fetch(`${API}/api/assistant/profile`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) { doLogout(); return; }
      if (!res.ok) return;
      currentUser = await res.json();
      safeStorage.setItem('berber_user', JSON.stringify(currentUser));
      document.getElementById('assistant-status').value = currentUser?.assistantStatus || 'working';
      document.getElementById('barber-name-display').textContent = currentUser?.name || '';
    } catch (e) {
      // Profil yüklenemezse panel mevcut oturum bilgisiyle devam eder.
    }
  }

  async function updateAssistantStatus() {
    const assistantStatus = document.getElementById('assistant-status').value;
    try {
      const res = await fetch(`${API}/api/assistant/status`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ assistantStatus })
      });
      if (res.status === 401) { doLogout(); return; }
      if (!res.ok) return;
      const data = await res.json();
      currentUser = data.profile;
      safeStorage.setItem('berber_user', JSON.stringify(currentUser));
    } catch (e) {
      document.getElementById('assistant-status').value = currentUser?.assistantStatus || 'working';
    }
  }

  function todayStr() {
    return new Date().toISOString().split('T')[0];
  }

  function updateDateHeader(date) {
    document.getElementById('display-date').textContent =
      `${date.getDate()} ${MONTHS[date.getMonth()]} ${date.getFullYear()}`;
    document.getElementById('display-day').textContent = DAYS[date.getDay()];
  }

  function changeDay(delta) {
    const picker = document.getElementById('date-picker');
    const d = new Date(picker.value);
    d.setDate(d.getDate() + delta);
    picker.value = d.toISOString().split('T')[0];
    loadAppointments();
  }

  async function loadAppointments() {
    const picker = document.getElementById('date-picker');
    const date = new Date(picker.value + 'T00:00:00');
    updateDateHeader(date);

    const container = document.getElementById('appointments-container');
    container.innerHTML = '<div class="loading"><span class="spinner"></span> Yükleniyor...</div>';

    // İstatistikleri sıfırla
    ['stat-total','stat-confirmed','stat-pending','stat-revenue'].forEach(id => {
      document.getElementById(id).textContent = '—';
    });

    try {
      const res = await fetch(`${API}/api/appointments/barber/${currentUser.id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (res.status === 401) { doLogout(); return; }
      const all = await res.json();

      // Seçili güne filtrele
      const dayStart = new Date(picker.value + 'T00:00:00');
      const dayEnd = new Date(picker.value + 'T23:59:59');

      const appts = all.filter(a => {
        const d = new Date(a.appointmentDate);
        return d >= dayStart && d <= dayEnd;
      }).sort((a, b) => new Date(a.appointmentDate) - new Date(b.appointmentDate));

      // İstatistikler
      const total = appts.length;
      const confirmed = appts.filter(a => a.status === 'confirmed').length;
      const pending = appts.filter(a => a.status === 'pending').length;
      const revenue = appts
        .filter(a => a.status !== 'cancelled')
        .reduce((sum, a) => sum + (a.price || 0), 0);

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-confirmed').textContent = confirmed;
      document.getElementById('stat-pending').textContent = pending;
      document.getElementById('stat-revenue').textContent = revenue > 0 ? revenue : '0';

      // Liste
      if (appts.length === 0) {
        container.innerHTML = '<div class="empty-state">Bu gün için randevu bulunmuyor.</div>';
        return;
      }

      container.innerHTML = '<div class="appointment-list">' +
        appts.map(a => {
          const time = new Date(a.appointmentDate);
          const hh = String(time.getHours()).padStart(2, '0');
          const mm = String(time.getMinutes()).padStart(2, '0');
          return `
            <div class="appointment-row status-${a.status}">
              <div class="appt-time">${hh}:${mm}</div>
              <div>
                <div class="appt-name">${a.customerName}</div>
                <div class="appt-phone">${a.customerPhone}</div>
              </div>
              <div class="appt-service">${SERVICES[a.serviceType] || a.serviceType}</div>
              <div class="appt-price">${a.price ? a.price + ' ₺' : '—'}</div>
              <div><span class="status-badge badge-${a.status}">${STATUS_TR[a.status]}</span></div>
            </div>`;
        }).join('') +
      '</div>';

    } catch (e) {
      container.innerHTML = '<div class="empty-state">Bağlantı hatası. Sunucu çalışıyor mu?</div>';
    }
  }

  async function loadMissedCalls() {
    const container = document.getElementById('missed-calls-container');
    container.innerHTML = '<div class="loading"><span class="spinner"></span> Yükleniyor...</div>';

    try {
      const res = await fetch(`${API}/api/assistant/missed-calls?limit=8`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (res.status === 401) { doLogout(); return; }
      const calls = await res.json();

      if (!calls.length) {
        container.innerHTML = '<div class="empty-state">Kaçan arama kaydı bulunmuyor.</div>';
        return;
      }

      container.innerHTML = '<div class="missed-call-list">' +
        calls.map(call => {
          const time = new Date(call.callAt);
          const label = call.fromName || 'Bilinmeyen kişi';
          return `
            <div class="missed-call-row">
              <div>
                <div class="call-name">${label}</div>
                <div class="call-phone">${call.fromPhone}</div>
              </div>
              <div class="category-badge">${call.contactCategory}</div>
              <div class="call-message">${call.autoReplyMessage || 'Otomatik mesaj yok'}</div>
              <div class="call-time">${time.toLocaleDateString('tr-TR')} ${time.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })}</div>
            </div>`;
        }).join('') +
      '</div>';
    } catch (e) {
      container.innerHTML = '<div class="empty-state">Kaçan aramalar yüklenemedi.</div>';
    }
  }
